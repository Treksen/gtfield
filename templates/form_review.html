{% extends "base.html" %}
{% set active = 'forms' %}
{% block title %}Review Form – FieldOps{% endblock %}
{% block content %}
<div class="page-header d-flex align-items-center justify-content-between flex-wrap gap-2">
  <div>
    <h5 class="mb-0" style="font-family:var(--mono);color:var(--amber)"><i class="bi bi-eye me-2"></i>REVIEW FORM</h5>
    <small style="color:var(--textdim)">Review and edit before approving or rejecting</small>
  </div>
  <a href="/forms" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="p-3">
  <div class="row g-3">
    <!-- Form metadata editor -->
    <div class="col-lg-4">
      <div class="card mb-3">
        <div class="card-header">FORM DETAILS</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" id="fTitle" value="{{ form.title }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="fDesc" rows="2">{{ form.description or '' }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" id="fCategory">
              {% for cat in ['general','medical','geospatial','socioeconomic','financial','environmental','education','agriculture','water_sanitation','other'] %}
              <option value="{{ cat }}" {% if form.category == cat %}selected{% endif %}>{{ cat.replace('_',' ').title() }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Status</label>
            <div style="font-size:13px;padding:8px 0" id="statusDisplay"></div>
          </div>
          <button class="btn btn-secondary btn-sm w-100 mb-2" type="button" onclick="saveEdits()">
            <i class="bi bi-save me-1"></i>Save Edits
          </button>
        </div>
      </div>
      <!-- Approve / Reject -->
      <div class="card">
        <div class="card-header">DECISION</div>
        <div class="card-body">
          <button class="btn btn-success w-100 mb-2" type="button" onclick="approveForm()">
            <i class="bi bi-check-circle me-1"></i>Approve & Publish
          </button>
          <button class="btn btn-danger w-100" type="button" onclick="rejectForm()">
            <i class="bi bi-x-circle me-1"></i>Reject Form
          </button>
        </div>
      </div>
    </div>

    <!-- Field preview -->
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>FORM FIELDS <span id="fieldCount" style="color:var(--amber)"></span></span>
          <span style="font-size:11px;color:var(--textdim)" id="creatorInfo"></span>
        </div>
        <div class="card-body" id="fieldPreview">
          <div style="color:var(--textdim)">Loading…</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
var FORM_ID = {{ form.id }};
var schema  = [];

async function loadForm(){
  try{
    var f = await api('GET', '/api/forms/'+FORM_ID);
    schema = f.schema || [];
    document.getElementById('fieldCount').textContent = '('+schema.length+' fields)';
    document.getElementById('fTitle').value    = f.title || '';
    document.getElementById('fDesc').value     = f.description || '';
    document.getElementById('fCategory').value = f.category || 'general';
    document.getElementById('statusDisplay').innerHTML = formStatusBadge(f.status) +
      (f.rejection_note ? '<div style="font-size:11px;color:var(--red);margin-top:4px">'+esc(f.rejection_note)+'</div>' : '');
    document.getElementById('creatorInfo').textContent = 'By: '+(f.creator_name||'Unknown');
    renderFields(schema);
  }catch(e){ toast(e.message,'error'); }
}

function renderFields(fields){
  var html = '';
  for(var i=0;i<fields.length;i++){
    var f=fields[i];
    var req=f.required?'<span style="color:var(--red)">*</span>':'';
    html+='<div class="mb-3 p-3" style="background:var(--surface2);border-radius:6px;border:1px solid var(--border)">';
    html+='<div class="d-flex justify-content-between align-items-start mb-2">';
    html+='<div><div style="font-weight:500">'+esc(f.label)+' '+req+'</div>';
    html+='<div style="font-size:11px;color:var(--textdim);font-family:var(--mono)">'+esc(f.type)+(f.required?' · required':'')+'</div>';
    if(f.hint) html+='<div style="font-size:11px;color:var(--textdim)">'+esc(f.hint)+'</div>';
    html+='</div>';
    html+='<span style="font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(240,165,0,.1);color:var(--amber);border:1px solid rgba(240,165,0,.2)">'+esc(f.type)+'</span>';
    html+='</div>';
    if(f.options&&f.options.length){
      html+='<div style="font-size:11px;color:var(--textdim)">Options: '+f.options.map(function(o){return'<span style="background:var(--border);padding:1px 6px;border-radius:3px;margin-right:4px">'+esc(o)+'</span>';}).join('')+'</div>';
    }
    html+='</div>';
  }
  document.getElementById('fieldPreview').innerHTML = html || '<div style="color:var(--textdim)">No fields defined.</div>';
}

async function saveEdits(){
  try{
    await api('PUT','/api/forms/'+FORM_ID,{
      title:       document.getElementById('fTitle').value,
      description: document.getElementById('fDesc').value,
      category:    document.getElementById('fCategory').value,
    });
    toast('Changes saved');
  }catch(e){toast(e.message,'error');}
}

async function approveForm(){
  try{
    await saveEdits();
    await api('POST','/api/forms/'+FORM_ID+'/approve');
    toast('Form approved and published!');
    setTimeout(function(){window.location.href='/forms';},1000);
  }catch(e){toast(e.message,'error');}
}

function rejectForm(){
  var note=prompt('Reason for rejection (required):');
  if(!note||!note.trim())return;
  api('POST','/api/forms/'+FORM_ID+'/reject',{note:note.trim()}).then(function(){
    toast('Form rejected','warning');
    setTimeout(function(){window.location.href='/forms';},1000);
  }).catch(function(e){toast(e.message,'error');});
}

loadForm();
</script>
{% endblock %}
