{% extends "base.html" %}
{% set active = 'orgs' %}
{% block title %}Organizations – FieldOps{% endblock %}
{% block content %}
<div class="page-header d-flex align-items-center justify-content-between">
  <div>
    <h5 class="mb-0" style="color:#e8f4ff"><i class="bi bi-building me-2" style="color:var(--amber)"></i>Organizations</h5>
    <small style="color:var(--textdim)">Manage organizations, their users, forms, and zones</small>
  </div>
  <button class="btn btn-primary btn-sm" onclick="openNew()"><i class="bi bi-plus me-1"></i>New Organization</button>
</div>

<div class="p-3">
  <div id="orgGrid" class="row g-3"></div>
</div>

<!-- Org Modal -->
<div class="modal fade" id="orgModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" style="font-family:var(--mono)" id="orgModalTitle">NEW ORGANIZATION</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="orgId">
        <div class="mb-3"><label class="form-label">Organization Name *</label>
          <input type="text" class="form-control" id="orgName" placeholder="e.g. Nairobi County Health"></div>
        <div class="mb-3"><label class="form-label">Description</label>
          <textarea class="form-control" id="orgDesc" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm me-auto" id="orgDeleteBtn" style="display:none" onclick="deleteOrg()">Delete</button>
        <button class="btn btn-primary" onclick="saveOrg()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Org Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" style="font-family:var(--mono)" id="detailTitle">ORGANIZATION DETAIL</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
let orgs = [];

async function load() {
  orgs = await api('GET','/api/organizations');
  render();
}

function render() {
  const grid = document.getElementById('orgGrid');
  if (!orgs.length) {
    grid.innerHTML = `<div class="col-12 text-center py-5" style="color:var(--textdim)">
      <i class="bi bi-building" style="font-size:2.5rem"></i>
      <p class="mt-3">No organizations yet.</p>
      <button class="btn btn-primary btn-sm" onclick="openNew()">Create First Organization</button>
    </div>`;
    return;
  }
  grid.innerHTML = orgs.map(o => `
    <div class="col-md-6 col-lg-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
              <h6 style="font-weight:600;margin-bottom:2px">${esc(o.name)}</h6>
              <small style="color:var(--textdim);font-family:var(--mono);font-size:10px">${esc(o.slug)}</small>
            </div>
            <div class="d-flex gap-1">
              <button class="btn btn-secondary btn-sm" onclick="openEdit(${o.id})"><i class="bi bi-pencil"></i></button>
            </div>
          </div>
          ${o.description ? `<p style="font-size:12px;color:var(--textdim);margin-bottom:12px">${esc(o.description)}</p>` : ''}
          <div class="row g-2 text-center mb-3" style="font-size:12px">
            <div class="col-4">
              <div style="font-family:var(--mono);font-size:20px;color:var(--cyan)">${o.member_count||0}</div>
              <div style="color:var(--textdim)">Members</div>
            </div>
            <div class="col-4">
              <div style="font-family:var(--mono);font-size:20px;color:var(--amber)">${o.form_count||0}</div>
              <div style="color:var(--textdim)">Forms</div>
            </div>
            <div class="col-4">
              <div style="font-family:var(--mono);font-size:20px;color:var(--green)">${o.zone_count||0}</div>
              <div style="color:var(--textdim)">Zones</div>
            </div>
          </div>
          <button class="btn btn-secondary btn-sm w-100" onclick="viewDetail(${o.id})">
            <i class="bi bi-eye me-1"></i>View Details
          </button>
        </div>
      </div>
    </div>`).join('');
}

function openNew() {
  document.getElementById('orgId').value='';
  document.getElementById('orgName').value='';
  document.getElementById('orgDesc').value='';
  document.getElementById('orgModalTitle').textContent='NEW ORGANIZATION';
  document.getElementById('orgDeleteBtn').style.display='none';
  new bootstrap.Modal(document.getElementById('orgModal')).show();
}

function openEdit(id) {
  const o = orgs.find(x=>x.id===id);
  if (!o) return;
  document.getElementById('orgId').value=o.id;
  document.getElementById('orgName').value=o.name;
  document.getElementById('orgDesc').value=o.description||'';
  document.getElementById('orgModalTitle').textContent='EDIT ORGANIZATION';
  document.getElementById('orgDeleteBtn').style.display='';
  new bootstrap.Modal(document.getElementById('orgModal')).show();
}

async function saveOrg() {
  const id   = document.getElementById('orgId').value;
  const name = document.getElementById('orgName').value.trim();
  const desc = document.getElementById('orgDesc').value.trim();
  if (!name) return toast('Name required','error');
  try {
    if (id) await api('PUT',`/api/organizations/${id}`,{name,description:desc});
    else    await api('POST','/api/organizations',{name,description:desc});
    toast(id?'Organization updated':'Organization created');
    bootstrap.Modal.getInstance(document.getElementById('orgModal')).hide();
    load();
  } catch(e) { toast(e.message,'error'); }
}

async function deleteOrg() {
  const id = document.getElementById('orgId').value;
  if (!confirm('Delete this organization? This cannot be undone.')) return;
  try {
    await api('DELETE',`/api/organizations/${id}`);
    toast('Organization deleted','warning');
    bootstrap.Modal.getInstance(document.getElementById('orgModal')).hide();
    load();
  } catch(e) { toast(e.message,'error'); }
}

async function viewDetail(id) {
  const o = orgs.find(x=>x.id===id);
  document.getElementById('detailTitle').textContent = (o?.name||'').toUpperCase();
  document.getElementById('detailBody').innerHTML = '<div style="color:var(--textdim);padding:16px">Loading…</div>';
  var detailModal = new bootstrap.Modal(document.getElementById('detailModal'));
  detailModal.show();

  try {
    const [members, forms, zones] = await Promise.all([
      api('GET',`/api/organizations/${id}/members`),
      api('GET','/api/forms').then(fs=>fs.filter(f=>f.org_id===id)),
      api('GET','/api/zones').then(zs=>zs.filter(z=>z.org_id===id)),
    ]);

    document.getElementById('detailBody').innerHTML = `
      <ul class="nav nav-tabs mb-3" style="border-color:var(--border)">
        <li class="nav-item"><a class="nav-link active" style="color:var(--amber);border-color:var(--border) var(--border) var(--surface2)" href="#" onclick="switchTab(event,'dt-members')">Members (${members.length})</a></li>
        <li class="nav-item"><a class="nav-link" style="color:var(--textdim)" href="#" onclick="switchTab(event,'dt-forms')">Forms (${forms.length})</a></li>
        <li class="nav-item"><a class="nav-link" style="color:var(--textdim)" href="#" onclick="switchTab(event,'dt-zones')">Zones (${zones.length})</a></li>
      </ul>

      <div id="dt-members">
        ${members.length ? `<div class="table-responsive"><table class="table table-sm">
          <thead><tr><th>Name</th><th>Role</th><th>Email</th><th>Employee ID</th><th>Status</th></tr></thead>
          <tbody>${members.map(m=>`<tr>
            <td>${esc(m.full_name)}</td>
            <td><span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;border:1px solid;color:var(--${m.role==='admin'?'red':m.role==='supervisor'?'amber':'cyan'})">${m.role.toUpperCase()}</span></td>
            <td style="font-size:12px;color:var(--textdim)">${esc(m.email)}</td>
            <td style="font-family:var(--mono);font-size:11px;color:var(--textdim)">${m.employee_id||'—'}</td>
            <td>${m.is_active?'<span style="color:var(--green)">Active</span>':'<span style="color:var(--textdim)">Inactive</span>'}</td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<p style="color:var(--textdim)">No members yet.</p>'}
      </div>

      <div id="dt-forms" style="display:none">
        ${forms.length ? forms.map(f=>`<div class="d-flex justify-content-between align-items-center mb-2 p-2" style="background:var(--surface2);border-radius:6px">
          <div>
            <span class="user-name">${esc(f.title)}</span>
            <span style="margin-left:8px">${formStatusBadge(f.status)}</span>
          </div>
          <div class="d-flex gap-2">
            ${f.status==='approved'?`<a href="/forms/${f.id}/data" class="btn btn-secondary btn-sm">Data</a>`:''}
            ${f.status==='pending_approval'?`
              <button class="btn btn-success btn-sm" onclick="approveFormDetail(${f.id})">Approve</button>
              <button class="btn btn-danger btn-sm" onclick="rejectFormDetailPrompt(${f.id})">Reject</button>`:''}
          </div>
        </div>`).join('') : '<p style="color:var(--textdim)">No forms.</p>'}
      </div>

      <div id="dt-zones" style="display:none">
        ${zones.length ? `<div class="row g-2">${zones.map(z=>`
          <div class="col-md-4"><div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid ${z.color||'#f0a500'};border-radius:6px;padding:10px">
            <div style="font-weight:500">${esc(z.name)}</div>
            <div style="font-size:11px;color:var(--textdim)">${[z.sub_county,z.ward].filter(Boolean).join(' · ')||'No location'}</div>
          </div></div>`).join('')}</div>` : '<p style="color:var(--textdim)">No zones.</p>'}
      </div>`;
  } catch(e) { toast(e.message,'error'); }
}

function switchTab(e, id) {
  e.preventDefault();
  ['dt-members','dt-forms','dt-zones'].forEach(function(t) {
    var el = document.getElementById(t);
    if (el) el.style.display = t===id?'':'none';
  });
  document.querySelectorAll('#detailBody .nav-link').forEach(function(a, i) {
    var active = ['dt-members','dt-forms','dt-zones'][i]===id;
    a.style.color = active ? 'var(--amber)' : 'var(--textdim)';
  });
}

async function approveFormDetail(fid) {
  try { await api('POST',`/api/forms/${fid}/approve`); toast('Form approved'); viewDetail(currentOrgId); } catch(e){toast(e.message,'error');}
}
function rejectFormDetailPrompt(fid) {
  const note=prompt('Reason for rejection:'); if(note===null)return;
  api('POST',`/api/forms/${fid}/reject`,{note}).then(()=>{toast('Rejected','warning');}).catch(e=>toast(e.message,'error'));
}

let currentOrgId=null;
const _vd=viewDetail;
viewDetail=function(id){currentOrgId=id;return _vd(id);};

load();
</script>
{% endblock %}
