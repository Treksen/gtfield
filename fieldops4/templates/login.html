<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldOps – Sign In</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e14;--surface:#111820;--surface2:#1a2330;--border:#1e2d3d;--amber:#f0a500;--text:#c8d6e5;--textdim:#5a7a96;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;
background-image:radial-gradient(ellipse at 20% 50%,rgba(240,165,0,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(57,211,83,.03) 0%,transparent 50%);}
.box{width:420px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px;box-shadow:0 40px 80px rgba(0,0,0,.5);}
.logo{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:var(--amber);letter-spacing:.12em;display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.logo::before{content:'';width:10px;height:10px;background:var(--amber);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.tagline{color:var(--textdim);font-size:12px;margin-bottom:28px;}
.form-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--textdim);display:block;margin-bottom:5px;}
.form-control{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:#e8f4ff;outline:none;font-family:'Inter',sans-serif;font-size:14px;transition:border-color .2s;}
.form-control:focus{border-color:var(--amber);}
.form-group{margin-bottom:16px;}
.btn-submit{width:100%;padding:12px;background:var(--amber);color:#000;border:none;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;margin-top:8px;transition:all .2s;}
.btn-submit:hover{background:#ffd166;}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.error{color:#ff4757;font-size:12px;margin-top:6px;min-height:18px;}
.demo-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--textdim);margin-bottom:8px;}
.demo-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.demo-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--textdim);cursor:pointer;transition:all .15s;}
.demo-pill:hover{border-color:var(--amber);color:var(--amber);}
.divider{text-align:center;margin:16px 0;color:var(--textdim);font-size:12px;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);}
.divider::before{left:0}.divider::after{right:0}
.link{color:var(--amber);text-decoration:none;font-size:12px;} .link:hover{text-decoration:underline;}
.footer-text{text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--textdim);}
</style>
</head>
<body>
<div class="box">
  <div class="logo">FieldOps</div>
  <div class="tagline">GPS Field Officer Tracking · NGOs & County Health</div>

  <!-- <div class="demo-label">Quick demo access</div>
  <div class="demo-pills">
    <span class="demo-pill" onclick="fill('admin@fieldops.demo')">Admin</span>
    <span class="demo-pill" onclick="fill('supervisor@fieldops.demo')">Supervisor</span>
    <span class="demo-pill" onclick="fill('amina@fieldops.demo')">Field Officer</span>
  </div> -->

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input id="email" class="form-control" type="email" placeholder="you@org.ke" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" class="form-control" type="password" placeholder="••••••••" required>
    </div>
    <div class="error" id="error"></div>
    <button class="btn-submit" id="submitBtn" type="submit">Sign In</button>
  </form>

  <div class="divider">or</div>
  <div style="text-align:center">
    <a href="/register" class="link">Create a new account</a>
  </div>

  <!-- <div class="footer-text">
    Demo password: <span style="font-family:'IBM Plex Mono',monospace;color:var(--amber)">fieldops2024</span>
    <br><span style="font-size:10px">No demo data? <a href="#" onclick="seedData()" class="link">Click to seed</a></span>
  </div> -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function fill(email) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = 'fieldops2024';
}

document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('error');
  btn.disabled = true; btn.textContent = 'Signing in…'; err.textContent = '';
  try {
    const res = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; btn.disabled=false; btn.textContent='Sign In'; return; }
    window.location.href = data.user.role === 'officer' ? '/checkin' : '/dashboard';
  } catch(e) { err.textContent = 'Connection error'; btn.disabled=false; btn.textContent='Sign In'; }
};

async function seedData() {
  const res = await fetch('/api/seed', {method:'POST'});
  const d = await res.json();
  if (res.ok) { alert('✓ ' + d.message + '\n\nRefresh and use demo login buttons!'); }
  else alert(d.error);
}
</script>
</body>
</html>
