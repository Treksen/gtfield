<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldOps – Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e14;--surface:#111820;--surface2:#1a2330;--border:#1e2d3d;--amber:#f0a500;--text:#c8d6e5;--textdim:#5a7a96;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{width:460px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px;box-shadow:0 40px 80px rgba(0,0,0,.5);}
.logo{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--amber);letter-spacing:.12em;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.logo::before{content:'';width:8px;height:8px;background:var(--amber);border-radius:50%;}
.tagline{color:var(--textdim);font-size:12px;margin-bottom:24px;}
.form-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--textdim);display:block;margin-bottom:5px;}
.form-control{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:#e8f4ff;outline:none;font-size:14px;transition:border-color .2s;}
.form-control:focus{border-color:var(--amber);}
.form-group{margin-bottom:14px;}
.btn-submit{width:100%;padding:12px;background:var(--amber);color:#000;border:none;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-submit:hover{background:#ffd166;}.btn-submit:disabled{opacity:.6;}
.error{color:#ff4757;font-size:12px;margin-top:6px;}
.info-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--textdim);}
.info-box strong{color:var(--amber);}
.link{color:var(--amber);font-size:12px;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">FieldOps</div>
  <div class="tagline">Create your account</div>

  <!-- <div class="info-box">
    <strong>Note:</strong> Self-registration creates a <strong>Field Officer</strong> account.
    Supervisors and Admins are created by an existing Admin from the Admin panel.
    The very first account registered automatically becomes Admin.
  </div> -->

  <form id="regForm">
    <div class="form-group">
      <label class="form-label">Full Name *</label>
      <input id="full_name" class="form-control" type="text" placeholder="e.g. Amina Wanjiku" required>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address *</label>
      <input id="email" class="form-control" type="email" placeholder="you@org.ke" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password *</label>
      <input id="password" class="form-control" type="password" placeholder="At least 6 characters" required>
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input id="phone" class="form-control" type="tel" placeholder="+254 7xx xxx xxx">
    </div>
    <div class="form-group">
      <label class="form-label">Organisation / County</label>
      <input id="org_name" class="form-control" type="text" placeholder="e.g. Nairobi County Health">
    </div>
    <div class="error" id="error"></div>
    <button class="btn-submit" id="submitBtn" type="submit">Create Account</button>
  </form>

  <div style="text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
    Already have an account? <a href="/login" class="link">Sign in</a>
  </div>
</div>

<script>
document.getElementById('regForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('error');
  btn.disabled=true; btn.textContent='Creating account…'; err.textContent='';
  try {
    const res = await fetch('/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        full_name: document.getElementById('full_name').value,
        email:     document.getElementById('email').value,
        password:  document.getElementById('password').value,
        phone:     document.getElementById('phone').value,
        org_name:  document.getElementById('org_name').value,
      })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; btn.disabled=false; btn.textContent='Create Account'; return; }
    window.location.href = data.user.role === 'officer' ? '/checkin' : '/dashboard';
  } catch(e) { err.textContent='Connection error'; btn.disabled=false; btn.textContent='Create Account'; }
};
</script>
</body>
</html>
